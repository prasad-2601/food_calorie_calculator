<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Food Calorie Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Food calorie calculator">
        <header class="topbar">
          <div>
            <p class="eyebrow">Nutrition Lab</p>
            <h1>Food Calorie Calculator</h1>
          </div>
          <div class="source-badge" id="sourceBadge">Local + Global</div>
        </header>

        <div class="content-grid">
          <section class="input-panel" aria-label="Calculator inputs">
            <label class="field">
              <span>Food item</span>
              <input id="foodInput" type="search" autocomplete="off" placeholder="Chicken biryani" />
            </label>

            <div class="suggestion-strip" id="suggestions" aria-live="polite"></div>

            <div class="form-grid">
              <label class="field">
                <span>Quantity</span>
                <input id="quantityInput" type="number" min="0.01" step="0.1" value="1" />
              </label>

              <label class="field">
                <span>Unit</span>
                <select id="unitInput">
                  <option value="serving">Serving</option>
                  <option value="g">Grams</option>
                  <option value="kg">Kilograms</option>
                  <option value="ml">Milliliters</option>
                  <option value="cup">Cup</option>
                  <option value="bowl">Bowl</option>
                  <option value="plate">Plate</option>
                  <option value="piece">Piece</option>
                  <option value="slice">Slice</option>
                  <option value="tablespoon">Tablespoon</option>
                  <option value="teaspoon">Teaspoon</option>
                  <option value="glass">Glass</option>
                  <option value="oz">Ounces</option>
                  <option value="lb">Pounds</option>
                </select>
              </label>

              <label class="field">
                <span>Body weight</span>
                <input id="weightInput" type="number" min="30" max="250" step="0.5" value="70" />
              </label>

              <label class="field">
                <span>Weight unit</span>
                <select id="weightUnitInput">
                  <option value="kg">kg</option>
                  <option value="lb">lb</option>
                </select>
              </label>
            </div>

            <div class="actions">
              <button class="primary-btn" id="calculateBtn" type="button">
                <span class="btn-icon">↵</span>
                Calculate
              </button>
              <button class="ghost-btn" id="globalSearchBtn" type="button">
                <span class="btn-icon">⌕</span>
                Global lookup
              </button>
            </div>

            <div class="status-line" id="statusLine">Ready</div>
          </section>

          <section class="visual-panel" aria-label="Selected food">
            <div class="food-stage" id="foodStage">
              <div class="plate-shadow"></div>
              <div class="food-visual" id="foodVisual">🍽️</div>
            </div>
            <div class="selected-food">
              <p id="selectedCuisine">Choose a food</p>
              <h2 id="selectedName">Your meal appears here</h2>
            </div>
          </section>
        </div>
      </section>

      <section class="results-grid" aria-label="Results">
        <article class="metric-card calorie-card">
          <span class="metric-label">Calories</span>
          <strong id="calorieValue">0</strong>
          <span id="gramValue">0 g estimated</span>
        </article>

        <article class="metric-card">
          <span class="metric-label">Protein</span>
          <strong id="proteinValue">0 g</strong>
          <div class="bar"><span id="proteinBar"></span></div>
        </article>

        <article class="metric-card">
          <span class="metric-label">Carbs</span>
          <strong id="carbValue">0 g</strong>
          <div class="bar"><span id="carbBar"></span></div>
        </article>

        <article class="metric-card">
          <span class="metric-label">Fat</span>
          <strong id="fatValue">0 g</strong>
          <div class="bar"><span id="fatBar"></span></div>
        </article>
      </section>

      <section class="burn-section" aria-label="Burn time">
        <div class="section-heading">
          <h2>Burn Time</h2>
          <p id="burnWeight">Based on 70 kg</p>
        </div>
        <div class="burn-grid" id="burnGrid"></div>
      </section>

      <section class="notes" id="notes" aria-live="polite"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
